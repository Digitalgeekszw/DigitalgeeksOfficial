<svg width="800" height="150" viewBox="0 0 800 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="150" fill="white"/>
  
  <!-- Left decorative strip -->
  <rect x="0" y="0" width="8" height="150" fill="url(#stripGradient)"/>
  
  <!-- Top border -->
  <line x1="0" y1="140" x2="800" y2="140" stroke="#1e3a8a" stroke-width="4"/>
  
  <!-- DigitalGeeks Logo text -->
  <text x="30" y="50" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#0f172a">Digital Geeks</text>
  <text x="30" y="75" font-family="Arial, sans-serif" font-size="13" fill="#64748b">Professional Growth. Technological Excellence.</text>
  
  <!-- Contact info -->
  <text x="30" y="105" font-family="Arial, sans-serif" font-size="12" fill="#475569">Website: www.digitalgeeks.tech</text>
  <text x="30" y="125" font-family="Arial, sans-serif" font-size="12" fill="#475569">Email: contact@digitalgeeks.tech</text>
  
  <defs>
    <linearGradient id="stripGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
